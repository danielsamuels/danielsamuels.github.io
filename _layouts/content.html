{% include header.html %}

<main id="content-wrapper">
    <h2>{{ page.title }}</h2>
    {% if page.date %}
        <time>{{ page.date | date_to_long_string }}</time>
    {% endif %}

    {{ content }}

    {% if page.canonical %}
    <p class="canonical-note">This post originally appeared <a href="{{ page.canonical }}" target="_blank" rel="noopener noreferrer">on the Onespacemedia website</a>.</p>
    {% endif %}
</main>

{% include footer.html %}
